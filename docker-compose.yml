services:
  postgres:
    image: postgres:16
    container_name: sentinelflow_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: sentinelflow_db
      POSTGRES_USER: sentinel_user
      POSTGRES_PASSWORD: sentinel_password
    ports:
      - "5433:5432"
    volumes:
      - sentinelflow_postgres_data:/var/lib/postgresql/data

volumes:
  sentinelflow_postgres_data: